<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mhmd Asadpour | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #2ea44f;
            --accent-hover: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            text-align: center;
        }

        .profile-card {
            background-color: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1rem;
            margin-top: 0;
            margin-bottom: 25px;
            font-family: monospace;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #8b949e;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .links {
            margin-top: 25px;
        }

        .links a {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.85rem;
            margin: 0 10px;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <h1>Mhmd Asadpour</h1>
            <div class="subtitle">@Mhmd-Asadpour-2006</div>
            
            <p>
                "Writing clean code and turning complex problems into simple, beautiful solutions. Tech enthusiast and developer."
            </p>

            <a href="mailto:asadpour808@gmail.com" class="btn">Get In Touch</a>

            <div class="links">
                <a href="https://github.com/Mhmd-Asadpour-2006" target="_blank">GitHub</a>
                <a href="#" target="_blank">LinkedIn</a>
            </div>
        </div>
    </div>

</body>
</html>
